<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COMMON</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main:#111; --bg-card:#1c1c1e; --bg-input:#2c2c2e; --text-main:#fff; --text-muted:#8e8e93; --my-blue:#007AFF; --line-green:#06c755; --border:#2c2c2e; --error-red:#ff3b30; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Zen Maru Gothic', sans-serif; color: var(--text-main); -webkit-tap-highlight-color: transparent; }
        
        #app-body { display: none; height: 100vh; flex-direction: column; background: var(--bg-main); padding-top: env(safe-area-inset-top); }
        .view { display: none; }

        .header { height: 55px; background: var(--bg-main); display: flex; align-items: center; justify-content: center; border-bottom: 0.5px solid var(--border); position: relative; z-index: 1100; }
        .header-right { position: absolute; right: 18px; font-size: 22px; cursor: pointer; padding: 5px; }
        .main-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
        
        /* チャットUI */
        #msg-list { display: flex; flex-direction: column; padding: 20px 15px 140px; gap: 20px; }
        .msg-bubble { display: flex; align-items: flex-start; gap: 12px; max-width: 85%; }
        .msg-bubble.mine { align-self: flex-end; flex-direction: row-reverse; }
        .user-icon { width: 40px; height: 40px; border-radius: 13px; background: #3a3a3c; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .msg-content { padding: 10px 15px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-break: break-all; background: var(--bg-card); }
        .mine .msg-content { background: var(--line-green); border-bottom-right-radius: 4px; }
        
        .input-bar { position: fixed; bottom: calc(65px + env(safe-area-inset-bottom)); left: 0; right: 0; background: var(--bg-main); padding: 12px 15px; border-top: 0.5px solid var(--border); z-index: 1050; display: none; align-items: center; gap: 10px; }
        .file-btn { font-size: 24px; cursor: pointer; user-select: none; }
        .input-box-wrapper { background: var(--bg-input); border-radius: 22px; display: flex; align-items: center; padding: 0 15px; flex: 1; min-height: 44px; }
        .input-box-wrapper input { background: none; border: none; color: #fff; flex: 1; padding: 10px 0; outline: none; font-size: 16px; }
        
        /* ボイスメモUI */
        .voice-section { background: var(--bg-card); margin: 15px; border-radius: 15px; padding: 20px; border: 0.5px solid var(--border); text-align: center; }
        .record-btn { width: 65px; height: 65px; border-radius: 50%; background: var(--error-red); border: none; color: #fff; font-weight: 900; cursor: pointer; margin-bottom: 10px; transition: transform 0.2s; }
        .record-btn.recording { animation: pulse 1s infinite; transform: scale(1.1); }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #audio-list audio { width: 100%; height: 35px; margin-top: 10px; }

        /* タブバー */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: calc(65px + env(safe-area-inset-bottom)); background: var(--bg-card); border-top: 0.5px solid var(--border); display: flex; z-index: 1000; }
        .tab-item { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 11px; font-weight: 700; flex-direction: column; }
        .tab-item.active { color: #fff; }

        /* 共通パーツ */
        .section-label { padding: 24px 16px 10px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .form-padding { padding: 0 16px; }
        input.base-input { background: var(--bg-card); border: 0.5px solid var(--border); color: #fff; padding: 15px; border-radius: 12px; width: 100%; box-sizing: border-box; margin-bottom: 15px; font-size: 16px; outline: none; }
        button.action-btn { background: var(--my-blue); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; font-size: 16px; }
        
        #enable-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        #enable-btn { background: none; border: 1px solid #fff; color: #fff; padding: 12px 35px; border-radius: 4px; font-size: 14px; font-weight: 700; letter-spacing: 2px; }

        #room-menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: flex-end; }
        .menu-sheet { background: var(--bg-card); width: 100%; border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 20px 0 calc(20px + env(safe-area-inset-bottom)); }
        .menu-item { padding: 18px 25px; border-bottom: 0.5px solid var(--border); font-size: 16px; display: flex; justify-content: space-between; }
        .danger { color: var(--error-red); }
    </style>
</head>
<body>

    <div id="enable-screen"><button id="enable-btn" onclick="startSequence()">ENABLE START</button></div>

    <div id="app-body">
        <div class="header">
            <div class="header-title" id="view-title">WELCOME</div>
            <div class="header-right" id="header-action" style="display:none;" onclick="toggleRoomMenu()">⋮</div>
        </div>
        
        <div class="main-content" id="scroll-area">
            <div id="auth-view" class="view">
                <div class="section-label">ACCOUNT ACCESS</div>
                <div class="form-padding">
                    <input type="email" id="auth-email" class="base-input" placeholder="メールアドレス">
                    <input type="password" id="auth-password" class="base-input" placeholder="パスワード">
                    <button class="action-btn" onclick="handleAuth()" id="auth-btn-text">ログイン</button>
                    <p style="text-align:center; font-size:13px; color:var(--text-muted); margin-top:25px;" onclick="toggleAuthMode()" id="auth-toggle-msg">新規アカウント作成はこちら</p>
                </div>
            </div>

            <div id="home-view" class="view">
                <div class="section-label">JOIN ROOM</div>
                <div class="form-padding">
                    <input type="text" id="join-id" class="base-input" placeholder="ルームID">
                    <input type="password" id="join-pass" class="base-input" placeholder="6桁パスワード" maxlength="6">
                    <button class="action-btn" onclick="joinRoom()">参加</button>
                </div>
                <div class="section-label">MY ROOMS</div>
                <div id="room-list"></div>
                <div class="form-padding" style="margin-top:20px;">
                    <button onclick="createRoom()" style="background:none; border:1px solid var(--border); color:#fff; width:100%; padding:15px; border-radius:12px; font-weight:700;">＋ 新規ルーム作成</button>
                </div>
            </div>

            <div id="chat-view" class="view" style="padding:0;"><div id="msg-list"></div></div>
            
            <div id="profile-view" class="view">
                <div class="section-label">USER PROFILE</div>
                <div class="form-padding">
                    <input type="text" id="p-name" class="base-input" placeholder="表示名 (必須)">
                    <input type="text" id="p-emoji" class="base-input" placeholder="絵文字アイコン (例: 🐱)">
                    <button class="action-btn" onclick="updateProfile()">設定を保存</button>
                    <button onclick="logout()" style="background:none; color:#ff3b30; border:none; margin-top:50px; width:100%; font-weight:700;">ログアウト</button>
                </div>
            </div>

            <div id="memo-view" class="view">
                <div class="section-label">VOICE MEMO</div>
                <div class="voice-section">
                    <button id="record-btn" class="record-btn" onclick="toggleRecording()">REC</button>
                    <p id="record-status" style="font-size:12px; color:var(--text-muted);">タップで録音</p>
                    <div id="audio-list"></div>
                </div>
                <div class="section-label">TEXT MEMO</div>
                <div class="form-padding">
                    <textarea id="memo-input" style="width:100%; height:200px; background:var(--bg-card); color:#fff; border:0.5px solid var(--border); border-radius:15px; padding:20px; box-sizing:border-box; outline:none; font-family:inherit; font-size:15px;" placeholder="メモ..."></textarea>
                </div>
            </div>
        </div>

        <div class="input-bar" id="bottom-bar">
            <div class="file-btn" onclick="openGigaFile()" title="ファイル送信">📎</div>
            <div class="input-box-wrapper"><input type="text" id="chat-input" placeholder="メッセージ..."></div>
            <div id="send-btn" onclick="sendMessage()" style="color:var(--my-blue); font-weight:900; cursor:pointer; padding:10px 0 10px 5px;">送信</div>
        </div>

        <div class="tab-bar" id="main-tabs" style="display:none;">
            <div class="tab-item" id="tab-home" onclick="changeTab('home')">トーク</div>
            <div class="tab-item" id="tab-memo" onclick="changeTab('memo')">メモ</div>
            <div class="tab-item" id="tab-profile" onclick="changeTab('profile')">設定</div>
        </div>
    </div>

    <div id="room-menu-overlay" onclick="toggleRoomMenu()">
        <div class="menu-sheet" onclick="event.stopPropagation()">
            <div class="menu-item"><span>Room ID</span> <span id="m-room-id">--</span></div>
            <div class="menu-item"><span>Password</span> <span id="m-room-pass">--</span></div>
            <div id="host-tools"></div>
            <div class="menu-item danger" onclick="leaveRoom()">ルームを退会する</div>
            <div class="menu-item" onclick="toggleRoomMenu()" style="justify-content:center; font-weight:700;">閉じる</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, orderBy, doc, getDoc, setDoc, where, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const config = { apiKey: "AIzaSyAP_BaYs01oniLSPQ5EOPV9m9brjKn-A2c", authDomain: "soshozi.firebaseapp.com", projectId: "soshozi", storageBucket: "soshozi.firebasestorage.app", messagingSenderId: "607624264440", appId: "1:607624264440:web:f3798bdc083a78b426190d" };
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let userProfile = null;
        let audioCtx = null;
        let unsubMsg = null;
        let unsubRooms = null;
        let currentRoomId = null;
        let authMode = 'login';
        let mediaRecorder;
        let audioChunks = [];

        window.changeTab = async (tab) => {
            const user = auth.currentUser;
            if (!user) { renderTab('auth'); return; }
            if (tab !== 'profile' && !userProfile) {
                const uDoc = await getDoc(doc(db, "users", user.uid));
                if (uDoc.exists()) userProfile = uDoc.data();
                if (!userProfile || !userProfile.name) { renderTab('profile'); return; }
            }
            renderTab(tab);
        };

        function renderTab(tab) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
            
            const isAuth = (tab === 'auth');
            document.getElementById('main-tabs').style.display = isAuth ? 'none' : 'flex';
            document.getElementById('bottom-bar').style.display = (tab === 'chat') ? 'flex' : 'none';
            document.getElementById('header-action').style.display = (tab === 'chat') ? 'block' : 'none';

            const target = document.getElementById(`${tab}-view`);
            if (target) target.style.display = 'block';

            const tabBtn = document.getElementById(`tab-${tab}`);
            if (tabBtn) tabBtn.classList.add('active');

            const titles = { auth: 'WELCOME', home: 'COMMON', profile: 'SETTING', memo: 'MEMO' };
            document.getElementById('view-title').innerText = titles[tab] || "COMMON";

            if (tab === 'home') loadMyRooms();
            if (tab === 'chat') loadMessages();
        }

        // ギガファイル便を開く
        window.openGigaFile = () => {
            window.open('https://gigafile.nu/', '_blank');
        };

        // ボイスメモ
        window.toggleRecording = async () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
                    mediaRecorder = new MediaRecorder(stream, { mimeType });
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(audioChunks, { type: mimeType });
                        const url = URL.createObjectURL(blob);
                        const div = document.createElement('div');
                        div.style.marginBottom = "15px";
                        div.innerHTML = `<audio controls src="${url}" style="width:100%"></audio><p style="font-size:10px; color:gray; margin:4px 0 0;">${new Date().toLocaleString()}</p>`;
                        document.getElementById('audio-list').prepend(div);
                    };

                    mediaRecorder.start();
                    document.getElementById('record-btn').classList.add('recording');
                    document.getElementById('record-status').innerText = "録音中... (タップで停止)";
                } catch (err) {
                    alert("マイクの使用を許可してください");
                }
            } else {
                mediaRecorder.stop();
                document.getElementById('record-btn').classList.remove('recording');
                document.getElementById('record-status').innerText = "タップで録音";
            }
        };

        window.startSequence = () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('enable-screen').style.display = 'none';
            document.getElementById('app-body').style.display = 'flex';
            window.changeTab(auth.currentUser ? 'home' : 'auth');
        };

        onAuthStateChanged(auth, (user) => {
            if (document.getElementById('app-body').style.display === 'flex') {
                window.changeTab(user ? 'home' : 'auth');
            }
        });

        window.handleAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            if(!email || !pass) return alert("未入力");
            try {
                if(authMode === 'login') await signInWithEmailAndPassword(auth, email, pass);
                else await createUserWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert(e.message); }
        };

        window.toggleAuthMode = () => {
            authMode = (authMode === 'login') ? 'signup' : 'login';
            document.getElementById('auth-btn-text').innerText = (authMode === 'login') ? 'ログイン' : '新規登録';
            document.getElementById('auth-toggle-msg').innerText = (authMode === 'login') ? '新規登録はこちら' : 'ログインはこちら';
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        window.updateProfile = async () => {
            const name = document.getElementById('p-name').value.trim();
            const emoji = document.getElementById('p-emoji').value.trim() || "👤";
            if(!name) return alert("名前必須");
            await setDoc(doc(db, "users", auth.currentUser.uid), { name, emoji }, { merge: true });
            userProfile = { name, emoji };
            window.changeTab('home');
        };

        window.loadMyRooms = () => {
            if(unsubRooms) unsubRooms();
            const q = query(collection(db, "rooms"), where("members", "array-contains", auth.currentUser.uid));
            unsubRooms = onSnapshot(q, (snap) => {
                const list = document.getElementById('room-list');
                list.innerHTML = "";
                snap.forEach(docSnap => {
                    const r = docSnap.data();
                    const btn = document.createElement('button');
                    btn.className = "action-btn"; btn.style.background = "var(--bg-card)"; btn.style.marginBottom = "10px";
                    btn.innerText = r.name;
                    btn.onclick = () => { currentRoomId = docSnap.id; window.changeTab('chat'); };
                    list.appendChild(btn);
                });
            });
        };

        window.sendMessage = async () => {
            if(!auth.currentUser || !currentRoomId) return;
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;
            const msgData = { uid: auth.currentUser.uid, emoji: userProfile?.emoji || "👤", text, time: Date.now() };
            input.value = "";
            await addDoc(collection(db, "rooms", currentRoomId, "messages"), msgData);
        };

        function loadMessages() {
            if (unsubMsg) unsubMsg();
            const q = query(collection(db, "rooms", currentRoomId, "messages"), orderBy("time", "asc"));
            unsubMsg = onSnapshot(q, (snap) => {
                const list = document.getElementById('msg-list');
                list.innerHTML = "";
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    const isMine = d.uid === auth.currentUser.uid;
                    const div = document.createElement('div');
                    div.className = `msg-bubble ${isMine ? 'mine' : 'other'}`;
                    div.innerHTML = `<div class="user-icon">${d.emoji}</div><div class="msg-content">${d.text}</div>`;
                    list.appendChild(div);
                });
                const area = document.getElementById('scroll-area');
                area.scrollTop = area.scrollHeight;
            });
        }

        window.createRoom = async () => {
            const name = prompt("ルーム名");
            if(!name) return;
            const pass = Math.floor(100000 + Math.random() * 900000).toString();
            await addDoc(collection(db, "rooms"), { name, pass, host: auth.currentUser.uid, members: [auth.currentUser.uid] });
        };

        window.joinRoom = async () => {
            const rid = document.getElementById('join-id').value.trim();
            const pass = document.getElementById('join-pass').value.trim();
            const rDoc = await getDoc(doc(db, "rooms", rid));
            if(rDoc.exists() && rDoc.data().pass === pass) {
                await updateDoc(doc(db, "rooms", rid), { members: arrayUnion(auth.currentUser.uid) });
                window.changeTab('home');
            } else { alert("失敗"); }
        };

        window.toggleRoomMenu = async () => {
            const el = document.getElementById('room-menu-overlay');
            if(el.style.display === 'flex') { el.style.display = 'none'; return; }
            const rDoc = await getDoc(doc(db, "rooms", currentRoomId));
            const rData = rDoc.data();
            document.getElementById('m-room-id').innerText = currentRoomId;
            document.getElementById('m-room-pass').innerText = rData.pass;
            el.style.display = 'flex';
        };

        window.leaveRoom = async () => {
            if(!confirm("退会？")) return;
            await updateDoc(doc(db, "rooms", currentRoomId), { members: arrayRemove(auth.currentUser.uid) });
            window.changeTab('home');
        };

        document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
