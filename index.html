<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>COMMON</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-main: #111111; --bg-card: #1c1c1e; --bg-input: #2c2c2e;
            --text-main: #ffffff; --text-muted: #8e8e93; --my-blue: #007AFF; 
            --line-green: #06c755; --border: #2c2c2e; --error-red: #ff3b30;
        }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
        body { font-family: 'Zen Maru Gothic', sans-serif; color: var(--text-main); }
        
        /* 起動・スプラッシュ演出 */
        #enable-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        #enable-btn { background: none; border: 1px solid #fff; color: #fff; padding: 10px 30px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 700; }
        #loading-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 10000; text-align: center; }
        #loading-bar-bg { width: 160px; height: 2px; background: #333; margin: auto; }
        #loading-fill { width: 0%; height: 100%; background: #fff; transition: width 0.1s; }
        #splash-screen { position: fixed; inset: 0; background: #000; display: none; align-items: center; justify-content: center; z-index: 9999; }
        #splash-logo { color: #E50914; font-size: 42px; font-weight: 900; opacity: 0; letter-spacing: 5px; }
        .animate-logo { animation: intro 2.8s ease-in-out forwards; }
        @keyframes intro { 0% { opacity: 0; transform: scale(0.9); } 20% { opacity: 1; transform: scale(1); } 100% { opacity: 0; filter: blur(10px); } }

        /* アプリ本体 */
        #app-body { display: none; height: 100vh; flex-direction: column; background: var(--bg-main); padding-top: env(safe-area-inset-top); }
        .header { height: 50px; background: var(--bg-main); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border); position: relative; }
        .header-title { font-weight: 700; font-size: 16px; }
        .header-right { position: absolute; right: 15px; font-size: 14px; color: var(--my-blue); cursor: pointer; font-weight: 700; }

        .main-content { flex: 1; overflow-y: auto; padding-bottom: calc(110px + env(safe-area-inset-bottom)); }

        /* ログイン制限用警告 */
        .auth-guard-msg { display: none; color: var(--error-red); text-align: center; margin-top: 50px; font-weight: 700; font-size: 14px; }

        /* リスト・UI */
        .list-item { padding: 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .list-item:active { background: #2c2c2e; }
        .list-info { display: flex; flex-direction: column; }
        .list-name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
        .list-id { font-size: 11px; color: var(--text-muted); }

        /* チャット */
        #msg-list { display: flex; flex-direction: column; padding: 15px; gap: 18px; }
        .msg-bubble { display: flex; align-items: flex-start; gap: 10px; max-width: 88%; }
        .msg-bubble.mine { align-self: flex-end; flex-direction: row-reverse; }
        .user-icon { width: 38px; height: 38px; border-radius: 12px; background: #3a3a3c; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .msg-content { padding: 9px 13px; border-radius: 16px; font-size: 15px; line-height: 1.45; }
        .mine .msg-content { background: var(--line-green); color: #fff; }
        .other .msg-content { background: var(--bg-card); color: #fff; }

        /* ボイスプレイヤー */
        .voice-player { display: flex; align-items: center; gap: 12px; min-width: 170px; padding: 4px 0; }
        .play-btn { background: none; border: none; color: #fff; font-size: 16px; cursor: pointer; width: 20px; }
        .seek-bar { flex: 1; height: 2px; -webkit-appearance: none; background: rgba(255,255,255,0.2); outline: none; }

        /* 入力バー */
        .input-bar { position: fixed; bottom: calc(65px + env(safe-area-inset-bottom)); left: 0; right: 0; background: var(--bg-main); padding: 8px 12px; border-top: 1px solid var(--border); }
        .input-box-wrapper { background: var(--bg-input); border-radius: 18px; display: flex; align-items: center; padding: 0 12px; flex: 1; }
        .input-box-wrapper input { background: none; border: none; color: #fff; flex: 1; padding: 9px 0; outline: none; font-size: 15px; font-family: inherit; }

        /* タブバー */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: calc(65px + env(safe-area-inset-bottom)); background: var(--bg-card); border-top: 1px solid var(--border); display: flex; }
        .tab-item { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 12px; font-weight: 700; cursor: pointer; }
        .tab-item.active { color: #fff; }

        /* 独自モーダル */
        #custom-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 11000; padding: 40px; }
        .modal-card { background: var(--bg-card); width: 100%; border-radius: 14px; padding: 24px; text-align: center; border: 1px solid #333; }
        .modal-btn-row { display: flex; gap: 12px; margin-top: 20px; }
        .m-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: 700; font-family: inherit; cursor: pointer; }

        .view { display: none; }
        .section-label { padding: 20px 16px 8px; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-padding { padding: 0 16px; }
        input.base-input { background: var(--bg-card); border: 0.5px solid var(--border); color: #fff; padding: 14px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 12px; font-size: 15px; outline: none; }
        button.action-btn { background: var(--my-blue); color: #fff; border: none; padding: 14px; border-radius: 10px; font-weight: 700; width: 100%; cursor: pointer; font-size: 15px; }
    </style>
</head>
<body>

    <div id="enable-screen"><button id="enable-btn" onclick="startSequence()">START APP</button></div>
    <div id="loading-container"><div id="loading-bar-bg"><div id="loading-fill"></div></div></div>
    <div id="splash-screen"><div id="splash-logo">COMMON</div></div>

    <div id="custom-modal">
        <div class="modal-card">
            <div id="modal-title" style="font-weight:700; font-size:17px; margin-bottom:8px;"></div>
            <div id="modal-desc" style="font-size:13px; color:var(--text-muted); line-height:1.5;"></div>
            <div class="modal-btn-row">
                <button class="m-btn" style="background:#3a3a3c; color:#fff;" onclick="closeModal()">戻る</button>
                <button id="modal-confirm-btn" class="m-btn" style="background:#ff3b30; color:#fff;">実行</button>
            </div>
        </div>
    </div>

    <div id="app-body">
        <div class="header">
            <div class="header-title" id="view-title">COMMON</div>
            <div class="header-right" id="header-action" style="display:none;" onclick="showRoomMenu()">編集</div>
        </div>
        
        <div class="main-content" id="scroll-area">
            <div id="login-view" class="view">
                <div class="section-label">ACCOUNT</div>
                <div class="form-padding">
                    <input type="email" id="auth-email" class="base-input" placeholder="メールアドレス">
                    <input type="password" id="auth-password" class="base-input" placeholder="パスワード">
                    <button class="action-btn" onclick="handleAuth()" id="auth-btn-text">ログイン</button>
                    <p style="text-align:center; font-size:12px; color:var(--text-muted); margin-top:20px;" onclick="toggleAuthMode()">新規アカウント作成はこちら</p>
                </div>
            </div>

            <div id="home-view" class="view">
                <div class="auth-guard-msg" id="guard-home">ログイン後に使用できます</div>
                <div id="home-content">
                    <div class="section-label">JOIN ROOM</div>
                    <div class="form-padding"><input type="text" id="join-id" class="base-input" placeholder="ルームID"><input type="password" id="join-pass" class="base-input" placeholder="6桁パスワード" maxlength="6"><button class="action-btn" onclick="joinRoom()">参加</button></div>
                    <div class="section-label">CHATS</div>
                    <div id="room-list"></div>
                    <div class="form-padding" style="margin-top:20px;"><button style="background:none; border:1px solid var(--border); color:var(--text-main); padding:12px; border-radius:10px; width:100%; font-weight:700;" onclick="createRoom()">＋ 新しいトークルーム</button></div>
                </div>
            </div>

            <div id="chat-view" class="view" style="padding:0;"><div id="msg-list"></div></div>
            
            <div id="profile-view" class="view">
                <div class="auth-guard-msg" id="guard-profile">ログイン後に使用できます</div>
                <div id="profile-content">
                    <div class="section-label">PROFILE</div>
                    <div class="form-padding">
                        <input type="text" id="p-name" class="base-input" placeholder="名前">
                        <input type="text" id="p-emoji" class="base-input" placeholder="アイコン(絵文字)">
                        <button class="action-btn" onclick="updateProfile()">保存して適用</button>
                        <button onclick="logout()" style="background:none; color:#ff3b30; border:none; margin-top:40px; width:100%; font-weight:700;">ログアウト</button>
                    </div>
                </div>
            </div>
            
            <div id="memo-view" class="view">
                <div class="auth-guard-msg" id="guard-memo">ログイン後に使用できます</div>
                <div id="memo-content" class="form-padding">
                    <div class="section-label" style="padding-left:0;">MY MEMO</div>
                    <textarea id="memo-input" style="width:100%; height:450px; background:var(--bg-card); color:#fff; border:0.5px solid var(--border); border-radius:12px; padding:15px; box-sizing:border-box; outline:none; resize:none; font-family:inherit; line-height:1.6;" placeholder="内容はリアルタイムで保存されます..."></textarea>
                </div>
            </div>
        </div>

        <div class="input-bar" id="bottom-bar" style="display:none;"><div id="normal-input" style="display: flex; gap: 12px; align-items: center;"><div style="cursor:pointer; font-size:22px;" onclick="startRecording()">🎤</div><div class="input-box-wrapper"><input type="text" id="chat-input" placeholder="メッセージ"></div><div onclick="sendMessage()" style="color:var(--my-blue); font-weight:bold; cursor:pointer; padding:0 5px;">送信</div></div><div id="recording-input" style="display: none; justify-content: space-between; align-items: center; width: 100%;"><div onclick="cancelRecording()" style="color:var(--text-muted); font-size:14px;">キャンセル</div><div style="color:#ff3b30; font-weight:bold; font-size:14px;">REC...</div><div onclick="finishRecording()" style="color:var(--my-blue); font-weight:bold;">送信</div></div></div>

        <div class="tab-bar" id="nav-tabs">
            <div class="tab-item active" id="tab-home" onclick="changeTab('home')">トーク</div>
            <div class="tab-item" id="tab-memo" onclick="changeTab('memo')">メモ</div>
            <div class="tab-item" id="tab-profile" onclick="changeTab('profile')">設定</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, orderBy, doc, getDoc, setDoc, where, updateDoc, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const config = { apiKey: "AIzaSyAP_BaYs01oniLSPQ5EOPV9m9brjKn-A2c", authDomain: "soshozi.firebaseapp.com", projectId: "soshozi", storageBucket: "soshozi.firebasestorage.app", messagingSenderId: "607624264440", appId: "1:607624264440:web:f3798bdc083a78b426190d" };
        const app = initializeApp(config), auth = getAuth(app), db = getFirestore(app);
        
        let userProfile = null, audioCtx = null, unsubMsg = null, authMode = 'login', currentRoomId = null;
        let mediaRecorder = null, audioChunks = [], micStream = null, lastMsgTime = 0;

        const getSupportedMimeType = () => {
            const types = ["audio/mp4", "audio/aac", "audio/webm;codecs=opus", "audio/webm"];
            for (let t of types) { if (MediaRecorder.isTypeSupported(t)) return t; }
            return "";
        };

        const playPopSound = (isSend) => {
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(isSend ? 880 : 660, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.06, now + 0.01);
            gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 0.1);
        };

        window.startSequence = () => {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('enable-screen').style.display = 'none';
            document.getElementById('loading-container').style.display = 'block';
            let w = 0; const iv = setInterval(() => {
                w += 10; document.getElementById('loading-fill').style.width = w + '%';
                if(w >= 100) { clearInterval(iv); document.getElementById('loading-container').style.display = 'none'; startSplash(); }
            }, 60);
        };
        const startSplash = () => {
            const sp = document.getElementById('splash-screen'); sp.style.display = 'flex';
            document.getElementById('splash-logo').classList.add('animate-logo');
            const now = audioCtx.currentTime;
            const g = audioCtx.createGain(); g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(0.2, now + 0.5); g.gain.linearRampToValueAtTime(0, now + 2.5);
            const o = audioCtx.createOscillator(); o.frequency.setValueAtTime(55, now); o.frequency.exponentialRampToValueAtTime(25, now + 2.5);
            o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now + 2.8);
            setTimeout(() => { sp.style.display = 'none'; document.getElementById('app-body').style.display = 'flex'; checkUser(); }, 2800);
        };

        window.toggleAuthMode = () => {
            authMode = (authMode === 'login' ? 'signup' : 'login');
            document.getElementById('auth-btn-text').innerText = (authMode === 'login' ? 'ログイン' : '新規登録');
        };
        window.handleAuth = async () => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-password').value;
            try { if(authMode==='login') await signInWithEmailAndPassword(auth, e, p); else await createUserWithEmailAndPassword(auth, e, p); } catch(err) { alert(err.message); }
        };

        const checkUser = () => {
            onAuthStateChanged(auth, async user => {
                if (user) {
                    const uDoc = await getDoc(doc(db, "users", user.uid));
                    if (uDoc.exists() && uDoc.data().name) { 
                        userProfile = uDoc.data(); 
                        document.getElementById('p-name').value = userProfile.name;
                        document.getElementById('p-emoji').value = userProfile.emoji;
                        applyGuard(false);
                        changeTab('home'); loadRooms(); 
                    } else { 
                        applyGuard(true);
                        showView('profile-view'); 
                    }
                } else { 
                    applyGuard(true);
                    showView('login-view'); 
                }
            });
        };

        // 【新設】権限ガード
        const applyGuard = (locked) => {
            const display = locked ? 'none' : 'block';
            const guard = locked ? 'block' : 'none';
            document.getElementById('home-content').style.display = display;
            document.getElementById('guard-home').style.display = guard;
            document.getElementById('memo-content').style.display = display;
            document.getElementById('guard-memo').style.display = guard;
            
            // プロフィール名は特別。未登録でも名前入力欄は必要なので、
            // 「完全にログアウト状態」の時だけロックする。
            const isLoggedOut = !auth.currentUser;
            document.getElementById('profile-content').style.display = isLoggedOut ? 'none' : 'block';
            document.getElementById('guard-profile').style.display = isLoggedOut ? 'block' : 'none';
        };

        window.joinRoom = async () => {
            const rid = document.getElementById('join-id').value.toUpperCase().trim(), pass = document.getElementById('join-pass').value.trim();
            if(!rid || !pass) return;
            const rDoc = await getDoc(doc(db, "rooms", rid));
            if(rDoc.exists() && rDoc.data().password === pass) {
                await updateDoc(doc(db, "rooms", rid), { members: arrayUnion(auth.currentUser.uid) });
                changeTab(rid);
            } else { alert("失敗しました"); }
        };
        window.createRoom = () => {
            const n = prompt("ルーム名"); if(!n) return;
            const p = prompt("6桁パスワード", "000000"); if(!p || p.length !== 6) return;
            const rid = Math.random().toString(36).substring(2, 8).toUpperCase();
            setDoc(doc(db, "rooms", rid), { name: n, password: p, host: auth.currentUser.uid, members: [auth.currentUser.uid], createdAt: Date.now() }).then(() => changeTab(rid));
        };
        window.showRoomMenu = async () => {
            if(!currentRoomId) return;
            const rDoc = await getDoc(doc(db, "rooms", currentRoomId));
            const data = rDoc.data(), isHost = data.host === auth.currentUser.uid;
            openModal(isHost ? "ルーム削除" : "ルーム退出", isHost ? "このルームと全てのログを削除します。" : "このルームから退出します。", isHost ? "削除" : "退出", async () => {
                if(isHost) await deleteDoc(doc(db, "rooms", currentRoomId));
                else await updateDoc(doc(db, "rooms", currentRoomId), { members: arrayRemove(auth.currentUser.uid) });
                changeTab('home');
            });
        };

        window.startRecording = async () => {
            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(micStream, { mimeType: getSupportedMimeType() });
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.start();
                document.getElementById('normal-input').style.display = 'none';
                document.getElementById('recording-input').style.display = 'flex';
            } catch (e) { alert("マイク使用不可"); }
        };
        const stopMic = () => { if(micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; } document.getElementById('normal-input').style.display = 'flex'; document.getElementById('recording-input').style.display = 'none'; };
        window.cancelRecording = () => { if(mediaRecorder) mediaRecorder.stop(); stopMic(); };
        window.finishRecording = () => {
            if(!mediaRecorder) return;
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
                const reader = new FileReader(); reader.readAsDataURL(blob);
                reader.onloadend = async () => {
                    await addDoc(collection(db, `rooms/${currentRoomId}/messages`), { uid: auth.currentUser.uid, name: userProfile.name, emoji: userProfile.emoji, voiceData: reader.result, createdAt: Date.now() });
                    playPopSound(true);
                };
                stopMic();
            };
            mediaRecorder.stop();
        };

        window.initVoicePlayer = (id, url) => {
            const audio = new Audio(url);
            const btn = document.getElementById(`btn-${id}`), seek = document.getElementById(`seek-${id}`);
            audio.onloadedmetadata = () => seek.max = Math.floor(audio.duration);
            audio.ontimeupdate = () => seek.value = Math.floor(audio.currentTime);
            audio.onended = () => { btn.innerText = "▶️"; seek.value = 0; };
            window[`playVoice_${id}`] = () => { if(audio.paused){ audio.play(); btn.innerText = "⏸️"; } else { audio.pause(); btn.innerText = "▶️"; } };
            window[`seekVoice_${id}`] = (v) => audio.currentTime = v;
        };

        window.sendMessage = async () => {
            const input = document.getElementById('chat-input'); if(!input.value.trim() || !currentRoomId) return;
            await addDoc(collection(db, `rooms/${currentRoomId}/messages`), { uid: auth.currentUser.uid, name: userProfile.name, emoji: userProfile.emoji, text: input.value.trim(), createdAt: Date.now() });
            input.value = ""; playPopSound(true);
        };

        window.changeTab = (t) => {
            currentRoomId = (t !== 'home' && t !== 'memo' && t !== 'profile') ? t : null;
            document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
            document.getElementById('bottom-bar').style.display = 'none';
            document.getElementById('header-action').style.display = 'none';
            
            if(t === 'home') { showView('home-view'); document.getElementById('tab-home').classList.add('active'); document.getElementById('view-title').innerText = "トーク一覧"; }
            else if(t === 'memo') { showView('memo-view'); loadMemo(); document.getElementById('tab-memo').classList.add('active'); document.getElementById('view-title').innerText = "メモ"; }
            else if(t === 'profile') { showView('profile-view'); document.getElementById('tab-profile').classList.add('active'); document.getElementById('view-title').innerText = "設定"; }
            else { 
                showView('chat-view'); loadMessages(t); 
                document.getElementById('bottom-bar').style.display = 'block'; 
                document.getElementById('header-action').style.display = 'block'; 
                document.getElementById('view-title').innerText = "トークルーム";
            }
        };

        const showView = (id) => { document.querySelectorAll('.view').forEach(v => v.style.display = 'none'); document.getElementById(id).style.display = 'block'; };
        const loadRooms = () => { onSnapshot(query(collection(db, "rooms"), where("members", "array-contains", auth.currentUser.uid)), s => { const list = document.getElementById('room-list'); list.innerHTML = ""; s.forEach(d => { list.innerHTML += `<div class="list-item" onclick="changeTab('${d.id}')"><div class="list-info"><div class="list-name">${d.data().name}</div><div class="list-id">ID: ${d.id}</div></div><div class="list-arrow">›</div></div>`; }); }); };
        const loadMemo = async () => { const m = await getDoc(doc(db, "memos", auth.currentUser.uid)); if(m.exists()) document.getElementById('memo-input').value = m.data().text; };
        document.getElementById('memo-input').oninput = async (e) => { if(auth.currentUser) await setDoc(doc(db, "memos", auth.currentUser.uid), { text: e.target.value }); };

        function loadMessages(rid) {
            if(unsubMsg) unsubMsg();
            lastMsgTime = Date.now();
            unsubMsg = onSnapshot(query(collection(db, `rooms/${rid}/messages`), orderBy("createdAt", "asc")), s => {
                const list = document.getElementById('msg-list'); list.innerHTML = "";
                s.forEach(d => {
                    const data = d.data(), isMine = data.uid === auth.currentUser.uid;
                    if (!isMine && data.createdAt > lastMsgTime) { playPopSound(false); lastMsgTime = data.createdAt; }
                    let content = data.text;
                    if(data.voiceData) {
                        const vid = d.id;
                        content = `<div class="voice-player"><button id="btn-${vid}" class="play-btn" onclick="playVoice_${vid}()">▶️</button><input id="seek-${vid}" type="range" class="seek-bar" value="0" oninput="seekVoice_${vid}(this.value)"></div>`;
                        setTimeout(() => initVoicePlayer(vid, data.voiceData), 50);
                    }
                    list.innerHTML += `<div class="msg-bubble ${isMine ? 'mine' : 'other'}"><div class="user-icon">${data.emoji || '👤'}</div><div class="msg-content">${content}</div></div>`;
                });
                document.getElementById('scroll-area').scrollTop = document.getElementById('scroll-area').scrollHeight;
            });
        }
        window.openModal = (t, d, c, f) => { document.getElementById('modal-title').innerText = t; document.getElementById('modal-desc').innerText = d; document.getElementById('modal-confirm-btn').innerText = c; document.getElementById('modal-confirm-btn').onclick = () => { f(); closeModal(); }; document.getElementById('custom-modal').style.display = 'flex'; };
        window.closeModal = () => document.getElementById('custom-modal').style.display = 'none';
        window.logout = () => signOut(auth).then(() => location.reload());
        window.updateProfile = async () => {
            const n = document.getElementById('p-name').value, e = document.getElementById('p-emoji').value;
            if(!n) return alert("名前は必須です");
            await setDoc(doc(db, "users", auth.currentUser.uid), {name:n, emoji:e}, {merge:true});
            userProfile = {name:n, emoji:e};
            applyGuard(false);
            changeTab('home');
        };
    </script>
</body>
</html>
