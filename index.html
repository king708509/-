<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COMMON - Round Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-dark: #313338; --bg-sidebar: #2b2d31; --bg-card: #383a40;
            --text-main: #dbdee1; --text-muted: #949ba4; --discord-blue: #5865f2;
            --netflix-red: #E50914; --sidebar-w: 240px;
        }
        /* 全体に丸文字フォントを適用 */
        body { 
            font-family: 'Zen Maru Gothic', sans-serif; 
            margin: 0; background: var(--bg-dark); color: var(--text-main); overflow: hidden; 
        }
        
        /* 1. 演出系（維持） */
        #enable-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        #enable-btn { background: none; border: 2px solid #fff; color: #fff; padding: 12px 40px; border-radius: 30px; cursor: pointer; letter-spacing: 2px; font-weight: 700; }
        #loading-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; z-index: 10000; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #fff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #loading-progress { width: 180px; height: 6px; background: #1e1f22; border-radius: 10px; margin: 0 auto; overflow: hidden; }
        #loading-bar { width: 0%; height: 100%; background: #fff; border-radius: 10px; }
        #splash-screen { position: fixed; inset: 0; background: #000; display: none; align-items: center; justify-content: center; z-index: 9999; }
        #splash-logo { color: var(--netflix-red); font-size: 55px; font-weight: 900; opacity: 0; letter-spacing: 8px; }
        .animate-logo { animation: intro 3s ease-in-out forwards; }
        @keyframes intro { 0% { opacity: 0; transform: scale(0.8); filter: blur(10px); } 20% { opacity: 1; transform: scale(1); filter: blur(0px); } 80% { opacity: 1; } 100% { opacity: 0; transform: scale(1.1); filter: blur(20px); } }

        /* 2. アプリ本体（角を丸く調整） */
        #app-body { display: none; height: 100vh; display: flex; flex-direction: row; }
        
        #sidebar { width: var(--sidebar-w); background: var(--bg-sidebar); display: flex; flex-direction: column; flex-shrink: 0; border-right: 1px solid #232428; }
        .sidebar-header { padding: 20px; font-weight: 900; border-bottom: 1px solid #232428; font-size: 18px; }
        .nav-list { flex: 1; overflow-y: auto; padding: 15px; }
        .nav-item { padding: 10px 15px; border-radius: 12px; cursor: pointer; margin-bottom: 5px; color: var(--text-muted); font-size: 15px; font-weight: 700; }
        .nav-item:hover { background: #35373c; color: var(--text-main); }
        .nav-item.active { background: #3f4147; color: #fff; }
        
        #main-area { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        .top-bar { height: 55px; background: var(--bg-dark); display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #232428; font-weight: 700; font-size: 16px; }
        .view { flex: 1; display: none; overflow-y: auto; padding: 20px; position: relative; }
        
        /* チャットエリア */
        #msg-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 15px 0; }
        .msg-row { display: flex; padding: 8px 25px; gap: 15px; border-radius: 15px; margin: 0 10px; }
        .msg-row:hover { background: rgba(255,255,255,0.03); }
        .msg-avatar { width: 44px; height: 44px; border-radius: 18px; background: #4e5058; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .msg-body { flex: 1; min-width: 0; }
        .msg-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
        .msg-user { font-weight: 700; color: #fff; font-size: 16px; }
        .msg-time { font-size: 12px; color: var(--text-muted); }
        .msg-text { font-size: 15px; line-height: 1.5; color: #dbdee1; }
        
        /* 入力エリア（さらに丸く） */
        .input-bar { padding: 0 25px 25px; background: var(--bg-dark); }
        .input-box { background: #383a40; border-radius: 25px; display: flex; align-items: center; padding: 5px 20px; gap: 15px; }
        .input-box input { background: none; border: none; color: #fff; flex: 1; padding: 12px 0; outline: none; font-size: 15px; font-family: 'Zen Maru Gothic', sans-serif; }
        .icon-btn { color: var(--text-muted); cursor: pointer; font-size: 22px; transition: 0.2s; text-decoration: none; }
        .icon-btn:hover { color: #fff; transform: scale(1.1); }

        /* カード・ボタン（丸み強化） */
        .card { background: var(--bg-card); padding: 25px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #232428; }
        input[type="email"], input[type="password"], input[type="text"], textarea { 
            background: #1e1f22; border: none; color: #fff; padding: 15px; border-radius: 12px; 
            width: 100%; box-sizing: border-box; margin: 10px 0; font-family: 'Zen Maru Gothic', sans-serif;
        }
        button { 
            background: var(--discord-blue); color: #fff; border: none; padding: 15px; 
            border-radius: 25px; font-weight: 700; cursor: pointer; width: 100%; font-size: 15px;
            transition: 0.2s;
        }
        button:hover { background: #4752c4; filter: brightness(1.1); }
        .secondary-btn { background: #4e5058; }
        
        @media (max-width: 600px) {
            #sidebar { position: absolute; left: calc(var(--sidebar-w) * -1); height: 100%; z-index: 2000; transition: 0.3s; }
            #sidebar.open { left: 0; }
            #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 1500; }
        }
    </style>
</head>
<body>

    <div id="enable-screen"><button id="enable-btn" onclick="startSequence()">ENABLE START</button></div>
    <div id="loading-container">
        <div class="spinner"></div>
        <div style="font-size:14px; margin-bottom:15px; color:#aaa; font-weight:700;">Wait a minute...</div>
        <div id="loading-progress"><div id="loading-bar"></div></div>
    </div>
    <div id="splash-screen"><div id="splash-logo">COMMON</div></div>

    <div id="app-body">
        <div id="overlay" onclick="toggleMenu()"></div>
        <div id="sidebar">
            <div class="sidebar-header">COMMON</div>
            <div class="nav-list">
                <div class="nav-item" onclick="changeTab('home')">🏠 ホーム</div>
                <div class="nav-item" onclick="changeTab('profile')">👤 設定</div>
                <div class="nav-item" onclick="changeTab('memo')">📝 メモ帳</div>
                <div style="margin-top:25px; font-size:12px; color:var(--text-muted); padding:10px; font-weight:900; letter-spacing:1px;">ROOMS</div>
                <div id="room-list"></div>
                <div class="nav-item" onclick="logout()" style="color:#f23f43; margin-top:40px;">🚪 ログアウト</div>
            </div>
        </div>

        <div id="main-area">
            <div class="top-bar">
                <div onclick="toggleMenu()" style="margin-right:15px; cursor:pointer; font-size:24px;" id="menu-trigger">☰</div>
                <span id="header-title">COMMON</span>
            </div>

            <div id="home-view" class="view">
                <div class="card">
                    <h3 style="margin-top:0;">こんにちは！</h3>
                    <button onclick="createRoom()">＋ 新しくルームを作る</button>
                    <button onclick="document.getElementById('join-form').style.display='block'" class="secondary-btn" style="margin-top:10px;">🔑 IDで参加する</button>
                </div>
                <div id="join-form" class="card" style="display:none; border:2px solid var(--discord-blue);">
                    <input type="text" id="join-id" placeholder="ルームIDを入力">
                    <input type="text" id="join-pass" placeholder="パスワードを入力">
                    <button onclick="joinRoom()">参加する</button>
                </div>
            </div>

            <div id="chat-view" class="view">
                <div id="msg-list"></div>
                <div class="input-bar">
                    <div class="input-box">
                        <a href="https://gigafile.nu/" target="_blank" class="icon-btn">📁</a>
                        <div id="mic-btn" class="icon-btn" onclick="toggleRecording()">🎤</div>
                        <input type="text" id="chat-input" placeholder="メッセージを送る...">
                        <div class="icon-btn" onclick="sendMessage()">🚀</div>
                    </div>
                </div>
            </div>

            <div id="profile-view" class="view">
                <div class="card">
                    <h2>プロフィール設定</h2>
                    <input type="text" id="p-emoji-input" placeholder="好きな絵文字" maxlength="2">
                    <input type="text" id="p-name-input" placeholder="お名前">
                    <button onclick="updateProfile()">保存する</button>
                </div>
            </div>

            <div id="memo-view" class="view">
                <div class="card" style="height: calc(100% - 50px);">
                    <textarea id="memo-input" style="height:100%; resize:none;" placeholder="ここに入力した内容は自動保存されます..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // Firebase設定（以前と同様）
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, orderBy, doc, getDoc, setDoc, where, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const config = { apiKey: "AIzaSyAP_BaYs01oniLSPQ5EOPV9m9brjKn-A2c", authDomain: "soshozi.firebaseapp.com", projectId: "soshozi", storageBucket: "soshozi.firebasestorage.app", messagingSenderId: "607624264440", appId: "1:607624264440:web:f3798bdc083a78b426190d" };
        const app = initializeApp(config), auth = getAuth(app), db = getFirestore(app);
        
        let userProfile = null, audioCtx = null, lastMsgTime = 0;

        // 音響系（フェード付）
        const initAudio = () => { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); };
        const playIntroSound = () => {
            const now = audioCtx.currentTime;
            const mainGain = audioCtx.createGain();
            mainGain.gain.setValueAtTime(0, now);
            mainGain.gain.linearRampToValueAtTime(0.4, now + 0.6);
            mainGain.gain.linearRampToValueAtTime(0, now + 3.0);
            const sub = audioCtx.createOscillator(); sub.type = 'sine'; sub.frequency.setValueAtTime(60, now);
            sub.frequency.exponentialRampToValueAtTime(32, now + 3.0);
            sub.connect(mainGain); mainGain.connect(audioCtx.destination);
            sub.start(now); sub.stop(now + 3.0);
        };
        const playPopSound = () => {
            initAudio(); const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(650, audioCtx.currentTime);
            g.gain.setValueAtTime(0.04, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        };

        // 演出シーケンス
        window.startSequence = () => {
            initAudio(); document.getElementById('enable-screen').style.display = 'none';
            document.getElementById('loading-container').style.display = 'block';
            let w = 0; const iv = setInterval(() => {
                w += 2.5; document.getElementById('loading-bar').style.width = w + '%';
                if(w >= 100) { clearInterval(iv); document.getElementById('loading-container').style.display = 'none'; startSplash(); }
            }, 30);
        };

        const startSplash = () => {
            const sp = document.getElementById('splash-screen');
            sp.style.display = 'flex';
            document.getElementById('splash-logo').classList.add('animate-logo');
            playIntroSound();
            setTimeout(() => { sp.style.display = 'none'; document.getElementById('app-body').style.display = 'flex'; checkUser(); }, 3000);
        };

        const checkUser = () => {
            onAuthStateChanged(auth, async user => {
                if (user) {
                    const uDoc = await getDoc(doc(db, "users", user.uid));
                    if (uDoc.exists() && uDoc.data().name) {
                        userProfile = uDoc.data();
                        const h = location.hash.substring(1);
                        if(h && h !== 'home') showView(h.length > 10 ? 'chat-view' : h + '-view');
                        else showView('home-view');
                        if(h.length > 10) loadMessages(h);
                        loadRooms();
                    } else showView('profile-view');
                } else showView('login-view');
            });
        };

        window.toggleMenu = () => { 
            const s = document.getElementById('sidebar'); s.classList.toggle('open'); 
            document.getElementById('overlay').style.display = s.classList.contains('open') ? 'block' : 'none'; 
        };
        window.changeTab = (t) => { location.hash = t; if(window.innerWidth <= 600) toggleMenu(); };
        const showView = (id) => { 
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none'); 
            const target = document.getElementById(id);
            if(target) target.style.display = id === 'chat-view' ? 'flex' : 'block'; 
        };

        function loadRooms() {
            onSnapshot(query(collection(db, "rooms"), where("members", "array-contains", auth.currentUser.uid)), s => {
                const list = document.getElementById('room-list'); list.innerHTML = "";
                s.forEach(d => {
                    list.innerHTML += `<div class="nav-item" onclick="location.hash='${d.id}'"># ${d.data().name}</div>`;
                });
            });
        }

        window.sendMessage = async () => {
            const input = document.getElementById('chat-input'), rid = location.hash.substring(1);
            if(!input.value.trim() || rid.length < 5) return;
            await addDoc(collection(db, `rooms/${rid}/messages`), { uid: auth.currentUser.uid, name: userProfile.name, emoji: userProfile.emoji, text: input.value.trim(), createdAt: Date.now() });
            input.value = ""; playPopSound();
        };

        function loadMessages(rid) {
            onSnapshot(query(collection(db, `rooms/${rid}/messages`), orderBy("createdAt", "asc")), s => {
                const list = document.getElementById('msg-list'); list.innerHTML = "";
                let latest = 0;
                s.forEach(d => {
                    const data = d.data(); if(data.createdAt > latest) latest = data.createdAt;
                    list.innerHTML += `
                        <div class="msg-row">
                            <div class="msg-avatar">${data.emoji}</div>
                            <div class="msg-body">
                                <div class="msg-header">
                                    <span class="msg-user">${data.name}</span>
                                    <span class="msg-time">${new Date(data.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                </div>
                                <div class="msg-text">${data.text || ''}</div>
                            </div>
                        </div>`;
                });
                if(lastMsgTime !== 0 && latest > lastMsgTime) playPopSound();
                lastMsgTime = latest;
                list.scrollTop = list.scrollHeight;
            });
        }

        window.addEventListener('beforeunload', (e) => { if(auth.currentUser) { e.preventDefault(); e.returnValue = "ログアウト..."; signOut(auth); } });
        document.getElementById('memo-input').oninput = async (e) => { if(auth.currentUser) await setDoc(doc(db, "memos", auth.currentUser.uid), { text: e.target.value }); };
        window.onhashchange = () => location.reload();
        window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => alert("ミス"));
        window.logout = () => { if(confirm("ログアウト？")) signOut(auth).then(() => location.reload()); };
        window.updateProfile = async () => { const n = document.getElementById('p-name-input').value, e = document.getElementById('p-emoji-input').value; if(!n || !e) return; await setDoc(doc(db, "users", auth.currentUser.uid), {name:n, emoji:e}, {merge:true}); location.hash="home"; location.reload(); };
        window.createRoom = async () => { const n = prompt("ルーム名"); if(!n) return; const rid = Math.random().toString(36).substring(2, 8).toUpperCase(), rpass = "1234"; await setDoc(doc(db, "rooms", rid), { name: n, host: auth.currentUser.uid, password: rpass, members: [auth.currentUser.uid], createdAt: Date.now() }); location.hash = rid; };
        window.joinRoom = async () => { const id = document.getElementById('join-id').value.trim().toUpperCase(), ps = document.getElementById('join-pass').value.trim(), r = await getDoc(doc(db, "rooms", id)); if(r.exists() && r.data().password === ps) { await updateDoc(doc(db, "rooms", id), { members: arrayUnion(auth.currentUser.uid) }); location.hash = id; } else alert("ミス"); };
    </script>
</body>
</html>
