<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="COMMON">
    
    <link rel="apple-touch-icon" href="icon-512.png">
    <link rel="manifest" href="manifest.json">
    
    <title>COMMON</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-dark: #313338; --bg-card: #2b2d31; --bg-bubble-other: #383a40;
            --text-main: #dbdee1; --text-muted: #949ba4; --discord-blue: #5865f2;
            --netflix-red: #E50914; 
        }
        
        html, body { height: 100%; height: -webkit-fill-available; margin: 0; padding: 0; overflow: hidden; background: #000; }
        body { font-family: 'Zen Maru Gothic', sans-serif; color: var(--text-main); }
        
        /* 1. 演出系 */
        #enable-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        #enable-btn { background: none; border: 2px solid #fff; color: #fff; padding: 12px 40px; border-radius: 30px; cursor: pointer; letter-spacing: 2px; font-weight: 700; }
        #loading-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; z-index: 10000; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #fff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #loading-progress { width: 180px; height: 6px; background: #1e1f22; border-radius: 10px; margin: 0 auto; overflow: hidden; }
        #loading-bar { width: 0%; height: 100%; background: #fff; border-radius: 10px; }
        #splash-screen { position: fixed; inset: 0; background: #000; display: none; align-items: center; justify-content: center; z-index: 9999; }
        #splash-logo { color: var(--netflix-red); font-size: 55px; font-weight: 900; opacity: 0; letter-spacing: 8px; }
        .animate-logo { animation: intro 3s ease-in-out forwards; }
        @keyframes intro { 0% { opacity: 0; transform: scale(0.8); filter: blur(10px); } 20% { opacity: 1; transform: scale(1); filter: blur(0px); } 80% { opacity: 1; } 100% { opacity: 0; transform: scale(1.1); filter: blur(20px); } }

        /* 2. アプリ本体レイアウト */
        #app-body { 
            display: none; height: 100vh; flex-direction: column; 
            background: var(--bg-dark);
            padding-top: env(safe-area-inset-top);
        }
        .header { height: 50px; background: var(--bg-card); display: flex; align-items: center; justify-content: center; font-weight: 900; border-bottom: 1px solid #232428; }
        .main-content { flex: 1; overflow-y: auto; padding-bottom: calc(140px + env(safe-area-inset-bottom)); }
        
        #msg-list { display: flex; flex-direction: column; padding: 15px; gap: 15px; }
        .msg-bubble { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
        .msg-bubble.mine { align-self: flex-end; flex-direction: row-reverse; }
        .user-emoji { width: 34px; height: 34px; border-radius: 12px; background: #4e5058; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .msg-content { padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-break: break-all; }
        .mine .msg-content { background: var(--discord-blue); color: #fff; border-bottom-right-radius: 4px; }
        .other .msg-content { background: var(--bg-bubble-other); color: var(--text-main); border-bottom-left-radius: 4px; }
        audio { height: 35px; width: 180px; margin-top: 5px; filter: invert(0.9); }

        .input-bar { 
            position: fixed; bottom: calc(60px + env(safe-area-inset-bottom)); 
            left: 0; right: 0; background: var(--bg-dark); 
            padding: 10px 15px; display: flex; gap: 12px; align-items: center; 
            border-top: 1px solid #232428; z-index: 100;
        }
        .input-box { background: var(--bg-card); border-radius: 25px; flex: 1; display: flex; align-items: center; padding: 0 15px; }
        .input-box input { background: none; border: none; color: #fff; flex: 1; padding: 12px 0; outline: none; font-family: 'Zen Maru Gothic', sans-serif; font-size: 16px; }
        
        .tab-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            height: calc(60px + env(safe-area-inset-bottom)); 
            background: var(--bg-card); border-top: 1px solid #232428; 
            display: flex; justify-content: space-around; align-items: flex-start;
            padding-top: 8px; z-index: 100;
        }
        .tab-item { text-align: center; font-size: 10px; color: var(--text-muted); flex: 1; }
        .tab-item.active { color: #fff; }
        .tab-icon { font-size: 22px; display: block; margin-bottom: 2px; }

        .view { display: none; padding: 20px; }
        .card { background: var(--bg-card); padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        button { background: var(--discord-blue); color: #fff; border: none; padding: 14px; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; }
        input[type="text"], input[type="email"], input[type="password"], textarea { background: #1e1f22; border: none; color: #fff; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin: 8px 0; font-family: 'Zen Maru Gothic', sans-serif; }
    </style>
</head>
<body>

    <div id="enable-screen"><button id="enable-btn" onclick="startSequence()">ENABLE START</button></div>
    <div id="loading-container"><div class="spinner"></div><div id="loading-progress"><div id="loading-bar"></div></div></div>
    <div id="splash-screen"><div id="splash-logo">COMMON</div></div>

    <div id="app-body">
        <div class="header" id="header-title">COMMON</div>
        <div class="main-content" id="scroll-area">
            <div id="login-view" class="view"><div class="card"><h3>ログイン</h3><input type="email" id="email" placeholder="メール"><input type="password" id="password" placeholder="パスワード"><button onclick="login()">ログイン</button></div></div>
            <div id="home-view" class="view"><div class="card"><h3>ROOMS</h3><div id="room-list"></div><button onclick="createRoom()" style="margin-top:15px;">＋ 新ルーム作成</button></div></div>
            <div id="chat-view" class="view" style="padding:0;"><div id="msg-list"></div></div>
            <div id="profile-view" class="view"><div class="card"><h2>設定</h2><input type="text" id="p-emoji" placeholder="絵文字"><input type="text" id="p-name" placeholder="お名前"><button onclick="updateProfile()">保存</button><button onclick="logout()" style="background:#f23f43; margin-top:20px;">ログアウト</button></div></div>
            <div id="memo-view" class="view" style="height:100%;"><div class="card" style="height:300px;"><textarea id="memo-input" style="height:100%; width:100%; resize:none; background:none; border:none; color:#fff;" placeholder="自動保存メモ..."></textarea></div></div>
        </div>

        <div class="input-bar" id="bottom-input-bar" style="display:none;">
            <a href="https://gigafile.nu/" target="_blank" style="text-decoration:none; font-size:22px;">📁</a>
            <div id="mic-btn" style="cursor:pointer; font-size:22px;" onclick="toggleRecording()">🎤</div>
            <div class="input-box"><input type="text" id="chat-input" placeholder="メッセージ..."></div>
            <div onclick="sendMessage()" style="font-size:22px; cursor:pointer;">🚀</div>
        </div>

        <div class="tab-bar">
            <div class="tab-item active" id="tab-home" onclick="changeTab('home')"><span class="tab-icon">🏠</span>ホーム</div>
            <div class="tab-item" id="tab-memo" onclick="changeTab('memo')"><span class="tab-icon">📝</span>メモ</div>
            <div class="tab-item" id="tab-profile" onclick="changeTab('profile')"><span class="tab-icon">👤</span>設定</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, orderBy, doc, getDoc, setDoc, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const config = { apiKey: "AIzaSyAP_BaYs01oniLSPQ5EOPV9m9brjKn-A2c", authDomain: "soshozi.firebaseapp.com", projectId: "soshozi", storageBucket: "soshozi.firebasestorage.app", messagingSenderId: "607624264440", appId: "1:607624264440:web:f3798bdc083a78b426190d" };
        const app = initializeApp(config), auth = getAuth(app), db = getFirestore(app);
        
        let userProfile = null, audioCtx = null, unsubMsg = null, mediaRecorder = null, audioChunks = [];

        // PWA Service Worker 登録
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW fail', err));
            });
        }

        const initAudio = () => { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); };
        const playIntroSound = () => {
            const now = audioCtx.currentTime;
            const g = audioCtx.createGain(); g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(0.4, now + 0.6); g.gain.linearRampToValueAtTime(0, now + 3.0);
            const osc = audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.setValueAtTime(60, now); osc.frequency.exponentialRampToValueAtTime(32, now + 3.0);
            osc.connect(g); g.connect(audioCtx.destination); osc.start(now); osc.stop(now + 3.0);
        };

        window.startSequence = () => {
            initAudio(); document.getElementById('enable-screen').style.display = 'none';
            document.getElementById('loading-container').style.display = 'block';
            let w = 0; const iv = setInterval(() => {
                w += 5; document.getElementById('loading-bar').style.width = w + '%';
                if(w >= 100) { clearInterval(iv); document.getElementById('loading-container').style.display = 'none'; startSplash(); }
            }, 30);
        };

        const startSplash = () => {
            const sp = document.getElementById('splash-screen'); sp.style.display = 'flex';
            document.getElementById('splash-logo').classList.add('animate-logo');
            playIntroSound();
            setTimeout(() => { sp.style.display = 'none'; document.getElementById('app-body').style.display = 'flex'; checkUser(); }, 3000);
        };

        window.toggleRecording = async () => {
            const btn = document.getElementById('mic-btn');
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream); audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader(); reader.readAsDataURL(blob);
                    reader.onloadend = async () => {
                        const rid = location.hash.substring(1);
                        await addDoc(collection(db, `rooms/${rid}/messages`), { uid: auth.currentUser.uid, name: userProfile.name, emoji: userProfile.emoji, voiceData: reader.result, createdAt: Date.now() });
                    };
                };
                mediaRecorder.start(); btn.style.color = "red";
            } else { mediaRecorder.stop(); btn.style.color = "inherit"; }
        };

        const checkUser = () => {
            onAuthStateChanged(auth, async user => {
                if (user) {
                    const uDoc = await getDoc(doc(db, "users", user.uid));
                    if (uDoc.exists()) { userProfile = uDoc.data(); changeTab('home'); loadRooms(); }
                    else showView('profile-view');
                } else showView('login-view');
            });
        };

        window.changeTab = (t) => {
            document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
            document.getElementById('bottom-input-bar').style.display = 'none';
            if(t === 'home') { showView('home-view'); document.getElementById('tab-home').classList.add('active'); }
            else if(t === 'memo') { showView('memo-view'); loadMemo(); document.getElementById('tab-memo').classList.add('active'); }
            else if(t === 'profile') { showView('profile-view'); document.getElementById('tab-profile').classList.add('active'); }
            else { showView('chat-view'); loadMessages(t); document.getElementById('bottom-input-bar').style.display = 'flex'; }
        };

        const showView = (id) => { document.querySelectorAll('.view').forEach(v => v.style.display = 'none'); document.getElementById(id).style.display = 'block'; };

        function loadRooms() {
            onSnapshot(query(collection(db, "rooms"), where("members", "array-contains", auth.currentUser.uid)), s => {
                const list = document.getElementById('room-list'); list.innerHTML = "";
                s.forEach(d => { list.innerHTML += `<div class="card" onclick="changeTab('${d.id}')" style="cursor:pointer; margin-bottom:10px;"># ${d.data().name}</div>`; });
            });
        }

        async function loadMemo() { const m = await getDoc(doc(db, "memos", auth.currentUser.uid)); if(m.exists()) document.getElementById('memo-input').value = m.data().text; }
        document.getElementById('memo-input').oninput = async (e) => { if(auth.currentUser) await setDoc(doc(db, "memos", auth.currentUser.uid), { text: e.target.value }); };

        window.sendMessage = async () => {
            const input = document.getElementById('chat-input'), rid = location.hash.substring(1);
            if(!input.value.trim() || !rid) return;
            await addDoc(collection(db, `rooms/${rid}/messages`), { uid: auth.currentUser.uid, name: userProfile.name, emoji: userProfile.emoji, text: input.value.trim(), createdAt: Date.now() });
            input.value = "";
        };

        function loadMessages(rid) {
            location.hash = rid; if(unsubMsg) unsubMsg();
            unsubMsg = onSnapshot(query(collection(db, `rooms/${rid}/messages`), orderBy("createdAt", "asc")), s => {
                const list = document.getElementById('msg-list'); list.innerHTML = "";
                s.forEach(d => {
                    const data = d.data(), isMine = data.uid === auth.currentUser.uid;
                    let content = data.text || "";
                    if(data.voiceData) content = `<audio controls src="${data.voiceData}"></audio>`;
                    list.innerHTML += `<div class="msg-bubble ${isMine ? 'mine' : 'other'}"><div class="user-emoji">${data.emoji}</div><div class="msg-content">${content}</div></div>`;
                });
                document.getElementById('scroll-area').scrollTop = document.getElementById('scroll-area').scrollHeight;
            });
        }

        window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => alert("ミス"));
        window.logout = () => signOut(auth).then(() => location.reload());
        window.updateProfile = async () => { const n = document.getElementById('p-name').value, e = document.getElementById('p-emoji').value; await setDoc(doc(db, "users", auth.currentUser.uid), {name:n, emoji:e}, {merge:true}); changeTab('home'); };
        window.createRoom = async () => { const n = prompt("ルーム名"); if(!n) return; const rid = Math.random().toString(36).substring(2, 8).toUpperCase(); await setDoc(doc(db, "rooms", rid), { name: n, members: [auth.currentUser.uid] }); changeTab(rid); };
    </script>
</body>
</html>
