<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>COMMON</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-main: #111111; --bg-card: #1c1c1e; --bg-input: #2c2c2e;
            --text-main: #ffffff; --text-muted: #8e8e93; --my-blue: #007AFF; 
            --line-green: #06c755; --border: #2c2c2e; --error-red: #ff3b30;
        }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
        body { font-family: 'Zen Maru Gothic', sans-serif; color: var(--text-main); -webkit-tap-highlight-color: transparent; }
        
        /* 起動・スプラッシュ演出 (一切の簡素化・削除禁止) */
        #enable-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        #enable-btn { background: none; border: 1px solid #fff; color: #fff; padding: 12px 35px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 700; letter-spacing: 2px; }
        #loading-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 10000; text-align: center; }
        #loading-bar-bg { width: 180px; height: 2px; background: #333; margin: auto; overflow: hidden; }
        #loading-fill { width: 0%; height: 100%; background: #fff; transition: width 0.1s linear; }
        #splash-screen { position: fixed; inset: 0; background: #000; display: none; align-items: center; justify-content: center; z-index: 9999; }
        #splash-logo { color: #E50914; font-size: 48px; font-weight: 900; opacity: 0; letter-spacing: 8px; }
        .animate-logo { animation: intro-animation 2.8s ease-in-out forwards; }
        @keyframes intro-animation { 
            0% { opacity: 0; transform: scale(0.85); filter: blur(5px); } 
            25% { opacity: 1; transform: scale(1); filter: blur(0px); } 
            75% { opacity: 1; transform: scale(1.05); filter: blur(0px); } 
            100% { opacity: 0; transform: scale(1.1); filter: blur(15px); } 
        }

        /* アプリ本体構造 */
        #app-body { display: none; height: 100vh; flex-direction: column; background: var(--bg-main); padding-top: env(safe-area-inset-top); }
        .header { height: 55px; background: var(--bg-main); display: flex; align-items: center; justify-content: center; border-bottom: 0.5px solid var(--border); position: relative; z-index: 100; }
        .header-title { font-weight: 700; font-size: 16px; letter-spacing: 0.5px; }
        .header-right { position: absolute; right: 18px; font-size: 14px; color: var(--my-blue); cursor: pointer; font-weight: 700; }

        .main-content { flex: 1; overflow-y: auto; padding-bottom: calc(120px + env(safe-area-inset-bottom)); -webkit-overflow-scrolling: touch; }

        /* ログイン制限用・赤い警告メッセージ (物理配置) */
        .auth-guard-msg { display: none; color: var(--error-red); text-align: center; margin-top: 120px; font-weight: 900; font-size: 16px; padding: 0 40px; line-height: 1.8; letter-spacing: 1px; }

        /* 本格リストUI */
        .list-item { padding: 18px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: background 0.2s; }
        .list-item:active { background: #2c2c2e; }
        .list-info { display: flex; flex-direction: column; gap: 4px; }
        .list-name { font-weight: 700; font-size: 16px; color: #fff; }
        .list-id { font-size: 11px; color: var(--text-muted); font-family: monospace; }
        .list-arrow { color: #3a3a3c; font-size: 20px; font-weight: 300; }

        /* チャットメッセージ */
        #msg-list { display: flex; flex-direction: column; padding: 20px 15px; gap: 20px; }
        .msg-bubble { display: flex; align-items: flex-start; gap: 12px; max-width: 85%; }
        .msg-bubble.mine { align-self: flex-end; flex-direction: row-reverse; }
        .user-icon { width: 40px; height: 40px; border-radius: 13px; background: #3a3a3c; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .msg-content { padding: 10px 15px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-break: break-all; position: relative; }
        .mine .msg-content { background: var(--line-green); color: #fff; border-bottom-right-radius: 4px; }
        .other .msg-content { background: var(--bg-card); color: #fff; border-bottom-left-radius: 4px; }

        /* カスタムボイスプレイヤー */
        .voice-player { display: flex; align-items: center; gap: 12px; min-width: 180px; padding: 5px 0; }
        .play-btn { background: none; border: none; color: #fff; font-size: 18px; cursor: pointer; width: 24px; display: flex; align-items: center; justify-content: center; }
        .seek-bar { flex: 1; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.25); outline: none; border-radius: 2px; }
        .seek-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; box-shadow: 0 0 4px rgba(0,0,0,0.3); }

        /* チャット入力バー */
        .input-bar { position: fixed; bottom: calc(65px + env(safe-area-inset-bottom)); left: 0; right: 0; background: var(--bg-main); padding: 10px 15px; border-top: 0.5px solid var(--border); z-index: 200; }
        .input-box-wrapper { background: var(--bg-input); border-radius: 22px; display: flex; align-items: center; padding: 0 15px; flex: 1; }
        .input-box-wrapper input { background: none; border: none; color: #fff; flex: 1; padding: 10px 0; outline: none; font-size: 16px; font-family: inherit; }

        /* タブバー (質素かつ本格的) */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: calc(65px + env(safe-area-inset-bottom)); background: var(--bg-card); border-top: 0.5px solid var(--border); display: flex; z-index: 300; }
        .tab-item { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 11px; font-weight: 700; cursor: pointer; flex-direction: column; gap: 4px; transition: color 0.2s; }
        .tab-item.active { color: #fff; }

        /* 独自モーダル */
        #custom-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 11000; padding: 40px; backdrop-filter: blur(5px); }
        .modal-card { background: var(--bg-card); width: 100%; max-width: 300px; border-radius: 18px; padding: 25px; text-align: center; border: 1px solid #333; animation: modal-in 0.3s cubic-bezier(0,0,0,1); }
        @keyframes modal-in { from { transform: scale(1.1); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-btn-row { display: flex; gap: 12px; margin-top: 25px; }
        .m-btn { flex: 1; padding: 13px; border-radius: 10px; border: none; font-weight: 700; font-family: inherit; cursor: pointer; font-size: 14px; }

        /* 汎用・入力フォーム */
        .view { display: none; animation: view-fade 0.3s ease; }
        @keyframes view-fade { from { opacity: 0; } to { opacity: 1; } }
        .section-label { padding: 24px 16px 10px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 700; }
        .form-padding { padding: 0 16px; }
        input.base-input { background: var(--bg-card); border: 0.5px solid var(--border); color: #fff; padding: 15px; border-radius: 12px; width: 100%; box-sizing: border-box; margin-bottom: 15px; font-size: 16px; outline: none; transition: border 0.2s; }
        input.base-input:focus { border-color: var(--my-blue); }
        button.action-btn { background: var(--my-blue); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; font-size: 16px; transition: opacity 0.2s; }
        button.action-btn:active { opacity: 0.8; }
    </style>
</head>
<body>

    <div id="enable-screen"><button id="enable-btn" onclick="startSequence()">ENABLE START</button></div>
    <div id="loading-container"><div id="loading-bar-bg"><div id="loading-fill"></div></div></div>
    <div id="splash-screen"><div id="splash-logo">COMMON</div></div>

    <div id="custom-modal">
        <div class="modal-card">
            <div id="modal-title" style="font-weight:700; font-size:18px; margin-bottom:10px;"></div>
            <div id="modal-desc" style="font-size:14px; color:var(--text-muted); line-height:1.6;"></div>
            <div class="modal-btn-row">
                <button class="m-btn" style="background:#3a3a3c; color:#fff;" onclick="closeModal()">キャンセル</button>
                <button id="modal-confirm-btn" class="m-btn" style="background:#ff3b30; color:#fff;"></button>
            </div>
        </div>
    </div>

    <div id="app-body">
        <div class="header">
            <div class="header-title" id="view-title">COMMON</div>
            <div class="header-right" id="header-action" style="display:none;" onclick="showRoomMenu()">編集</div>
        </div>
        
        <div class="main-content" id="scroll-area">
            
            <div id="login-view" class="view">
                <div class="section-label">ACCOUNT ACCESS</div>
                <div class="form-padding">
                    <input type="email" id="auth-email" class="base-input" placeholder="メールアドレス">
                    <input type="password" id="auth-password" class="base-input" placeholder="パスワード">
                    <button class="action-btn" onclick="handleAuth()" id="auth-btn-text">ログイン</button>
                    <p style="text-align:center; font-size:13px; color:var(--text-muted); margin-top:25px;" onclick="toggleAuthMode()" id="auth-toggle-msg">新規アカウント作成はこちら</p>
                </div>
            </div>

            <div id="home-view" class="view">
                <div class="auth-guard-msg" id="guard-home">ログイン後に使用できる旨。</div>
                <div id="home-content" style="display:none;">
                    <div class="section-label">JOIN ROOM</div>
                    <div class="form-padding">
                        <input type="text" id="join-id" class="base-input" placeholder="ルームIDを入力">
                        <input type="password" id="join-pass" class="base-input" placeholder="6桁パスワード" maxlength="6">
                        <button class="action-btn" onclick="joinRoom()">参加する</button>
                    </div>
                    <div class="section-label">MY TALK ROOMS</div>
                    <div id="room-list"></div>
                    <div class="form-padding" style="margin-top:25px;">
                        <button style="background:none; border:1px solid var(--border); color:var(--text-main); padding:15px; border-radius:12px; width:100%; font-weight:700; font-size:14px;" onclick="createRoom()">＋ トークルームを新規作成</button>
                    </div>
                </div>
            </div>

            <div id="chat-view" class="view" style="padding:0;"><div id="msg-list"></div></div>
            
            <div id="profile-view" class="view">
                <div class="auth-guard-msg" id="guard-profile">ログイン後に使用できる旨。</div>
                <div id="profile-content" style="display:none;">
                    <div class="section-label">USER PROFILE</div>
                    <div class="form-padding">
                        <input type="text" id="p-name" class="base-input" placeholder="表示名">
                        <input type="text" id="p-emoji" class="base-input" placeholder="アイコン絵文字 (例: 🐺)">
                        <button class="action-btn" onclick="updateProfile()">設定を保存</button>
                        <button onclick="logout()" style="background:none; color:#ff3b30; border:none; margin-top:50px; width:100%; font-weight:700; font-size:14px; letter-spacing:1px;">ログアウト</button>
                    </div>
                </div>
                <div id="profile-login-gate" style="display:none;">
                    <div class="section-label">LOGIN REQUIRED</div>
                    <div class="form-padding">
                        <button class="action-btn" style="background:var(--bg-card); border:1px solid var(--border);" onclick="changeTab('home')">ログイン画面へ戻る</button>
                    </div>
                </div>
            </div>
            
            <div id="memo-view" class="view">
                <div class="auth-guard-msg" id="guard-memo">ログイン後に使用できる旨。</div>
                <div id="memo-content" style="display:none;" class="form-padding">
                    <div class="section-label" style="padding-left:0;">SYNCED MEMO</div>
                    <textarea id="memo-input" style="width:100%; height:480px; background:var(--bg-card); color:#fff; border:0.5px solid var(--border); border-radius:15px; padding:20px; box-sizing:border-box; outline:none; resize:none; font-family:inherit; line-height:1.8; font-size:15px;" placeholder="ここに書いた内容はリアルタイムで同期保存されます..."></textarea>
                </div>
            </div>
        </div>

        <div class="input-bar" id="bottom-bar" style="display:none;">
            <div id="normal-input" style="display: flex; gap: 15px; align-items: center;">
                <div style="cursor:pointer; font-size:24px; filter: grayscale(1);" onclick="startRecording()">🎤</div>
                <div class="input-box-wrapper"><input type="text" id="chat-input" placeholder="メッセージを入力..."></div>
                <div onclick="sendMessage()" style="color:var(--my-blue); font-weight:900; cursor:pointer; padding:0 5px; font-size:15px;">送信</div>
            </div>
            <div id="recording-input" style="display: none; justify-content: space-between; align-items: center; width: 100%;">
                <div onclick="cancelRecording()" style="color:var(--text-muted); font-size:14px; font-weight:700;">キャンセル</div>
                <div style="color:#ff3b30; font-weight:900; font-size:14px; animation: pulse 1s infinite;">● REC...</div>
                <div onclick="finishRecording()" style="color:var(--my-blue); font-weight:900; font-size:14px;">録音を送信</div>
            </div>
        </div>
        <style>@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }</style>

        <div class="tab-bar" id="nav-tabs">
            <div class="tab-item active" id="tab-home" onclick="changeTab('home')"><span>トーク</span></div>
            <div class="tab-item" id="tab-memo" onclick="changeTab('memo')"><span>メモ</span></div>
            <div class="tab-item" id="tab-profile" onclick="changeTab('profile')"><span>設定</span></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, orderBy, doc, getDoc, setDoc, where, updateDoc, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const config = { apiKey: "AIzaSyAP_BaYs01oniLSPQ5EOPV9m9brjKn-A2c", authDomain: "soshozi.firebaseapp.com", projectId: "soshozi", storageBucket: "soshozi.firebasestorage.app", messagingSenderId: "607624264440", appId: "1:607624264440:web:f3798bdc083a78b426190d" };
        const app = initializeApp(config), auth = getAuth(app), db = getFirestore(app);
        
        let userProfile = null, audioCtx = null, unsubMsg = null, authMode = 'login', currentRoomId = null;
        let mediaRecorder = null, audioChunks = [], micStream = null, lastMsgTime = 0;

        // 全機種対応MIME (一切の簡略化禁止)
        const getSupportedMimeType = () => {
            const types = ["audio/mp4", "audio/aac", "audio/webm;codecs=opus", "audio/webm", "audio/ogg;codecs=opus"];
            for (let t of types) { if (MediaRecorder.isTypeSupported(t)) return t; }
            return "";
        };

        // 効果音生成ロジック (一切の簡略化禁止)
        const playPopSound = (isSend) => {
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(isSend ? 880 : 660, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.12);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.08, now + 0.01);
            gain.gain.linearRampToValueAtTime(0, now + 0.12);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 0.15);
        };

        // 演出シークエンス (一切の簡略化禁止)
        window.startSequence = () => {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('enable-screen').style.display = 'none';
            document.getElementById('loading-container').style.display = 'block';
            let progress = 0; 
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 15) + 5;
                if(progress > 100) progress = 100;
                document.getElementById('loading-fill').style.width = progress + '%';
                if(progress >= 100) { clearInterval(interval); setTimeout(runSplash, 300); }
            }, 80);
        };
        const runSplash = () => {
            document.getElementById('loading-container').style.display = 'none';
            const sp = document.getElementById('splash-screen'); sp.style.display = 'flex';
            document.getElementById('splash-logo').classList.add('animate-logo');
            
            // イントロ低音 (一切の削除禁止)
            const now = audioCtx.currentTime;
            const g = audioCtx.createGain(); 
            g.gain.setValueAtTime(0, now); 
            g.gain.linearRampToValueAtTime(0.25, now + 0.6); 
            g.gain.linearRampToValueAtTime(0, now + 2.6);
            const o = audioCtx.createOscillator(); 
            o.type = 'sine';
            o.frequency.setValueAtTime(55, now); 
            o.frequency.exponentialRampToValueAtTime(20, now + 2.6);
            o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now + 2.8);
            
            setTimeout(() => { sp.style.display = 'none'; document.getElementById('app-body').style.display = 'flex'; checkUserStatus(); }, 2800);
        };

        // 認証ロジック
        window.toggleAuthMode = () => {
            authMode = (authMode === 'login' ? 'signup' : 'login');
            document.getElementById('auth-btn-text').innerText = (authMode === 'login' ? 'ログイン' : '新規登録を実行');
            document.getElementById('auth-toggle-msg').innerText = (authMode === 'login' ? '新規アカウント作成はこちら' : '既にアカウントをお持ちの方はこちら');
        };
        window.handleAuth = async () => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-password').value;
            if(!e || !p) return alert("情報を入力してください");
            try { 
                if(authMode==='login') await signInWithEmailAndPassword(auth, e, p); 
                else await createUserWithEmailAndPassword(auth, e, p); 
            } catch(err) { alert("認証エラー: " + err.message); }
        };

        // 【修正】ユーザー監視とガード処理 (一切の簡略化禁止)
        const checkUserStatus = () => {
            onAuthStateChanged(auth, async user => {
                if (user) {
                    const uDoc = await getDoc(doc(db, "users", user.uid));
                    if (uDoc.exists() && uDoc.data().name) { 
                        userProfile = uDoc.data(); 
                        document.getElementById('p-name').value = userProfile.name;
                        document.getElementById('p-emoji').value = userProfile.emoji;
                        applySecurityGuard(false);
                        changeTab('home'); 
                    } else { 
                        // ログイン中だが名前がない
                        applySecurityGuard(true);
                        showView('profile-view'); 
                    }
                } else { 
                    // 未ログイン
                    applySecurityGuard(true);
                    showView('login-view'); 
                }
            });
        };

        const applySecurityGuard = (isLocked) => {
            const contentDisplay = isLocked ? 'none' : 'block';
            const guardDisplay = isLocked ? 'block' : 'none';

            // ホーム・メモのガード
            document.getElementById('home-content').style.display = contentDisplay;
            document.getElementById('guard-home').style.display = guardDisplay;
            document.getElementById('memo-content').style.display = contentDisplay;
            document.getElementById('guard-memo').style.display = guardDisplay;
            
            // プロフィールのガード（ログインさえしていれば入力フォームは出す）
            if (auth.currentUser) {
                document.getElementById('profile-content').style.display = 'block';
                document.getElementById('guard-profile').style.display = 'none';
                document.getElementById('profile-login-gate').style.display = 'none';
            } else {
                document.getElementById('profile-content').style.display = 'none';
                document.getElementById('guard-profile').style.display = 'block';
                document.getElementById('profile-login-gate').style.display = 'block';
            }
        };

        // タブ切り替えロジック
        window.changeTab = (t) => {
            currentRoomId = (t !== 'home' && t !== 'memo' && t !== 'profile') ? t : null;
            document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`tab-${t === 'home' || t === 'memo' || t === 'profile' ? t : 'home'}`).classList.add('active');
            
            document.getElementById('bottom-bar').style.display = 'none';
            document.getElementById('header-action').style.display = 'none';

            if (!auth.currentUser && t !== 'profile') {
                showView('login-view');
                document.getElementById('view-title').innerText = "LOGIN";
                return;
            }

            if(t === 'home') { showView('home-view'); loadRooms(); document.getElementById('view-title').innerText = "トーク一覧"; }
            else if(t === 'memo') { showView('memo-view'); loadMemoData(); document.getElementById('view-title').innerText = "メモ"; }
            else if(t === 'profile') { showView('profile-view'); document.getElementById('view-title').innerText = "設定"; }
            else { 
                showView('chat-view'); 
                loadMessages(t); 
                document.getElementById('bottom-bar').style.display = 'block'; 
                document.getElementById('header-action').style.display = 'block'; 
                document.getElementById('view-title').innerText = "トークルーム";
            }
        };

        const showView = (id) => { document.querySelectorAll('.view').forEach(v => v.style.display = 'none'); document.getElementById(id).style.display = 'block'; };

        // 録音・ボイメ (全機能保持)
        window.startRecording = async () => {
            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(micStream, { mimeType: getSupportedMimeType() });
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.start();
                document.getElementById('normal-input').style.display = 'none';
                document.getElementById('recording-input').style.display = 'flex';
            } catch (e) { alert("マイクの許可が必要です。"); }
        };
        const stopMicTracks = () => { if(micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; } document.getElementById('normal-input').style.display = 'flex'; document.getElementById('recording-input').style.display = 'none'; };
        window.cancelRecording = () => { if(mediaRecorder) mediaRecorder.stop(); stopMicTracks(); };
        window.finishRecording = () => {
            if(!mediaRecorder) return;
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
                const reader = new FileReader(); reader.readAsDataURL(blob);
                reader.onloadend = async () => {
                    await addDoc(collection(db, `rooms/${currentRoomId}/messages`), { uid: auth.currentUser.uid, name: userProfile.name, emoji: userProfile.emoji, voiceData: reader.result, createdAt: Date.now() });
                    playPopSound(true);
                };
                stopMicTracks();
            };
            mediaRecorder.stop();
        };

        window.initVoicePlayer = (id, url) => {
            const audio = new Audio(url);
            const btn = document.getElementById(`btn-${id}`), seek = document.getElementById(`seek-${id}`);
            audio.onloadedmetadata = () => seek.max = Math.floor(audio.duration);
            audio.ontimeupdate = () => seek.value = Math.floor(audio.currentTime);
            audio.onended = () => { btn.innerText = "▶️"; seek.value = 0; };
            window[`playVoice_${id}`] = () => { if(audio.paused){ audio.play(); btn.innerText = "⏸️"; } else { audio.pause(); btn.innerText = "▶️"; } };
            window[`seekVoice_${id}`] = (v) => audio.currentTime = v;
        };

        // メッセージ・ルーム処理
        window.sendMessage = async () => {
            const input = document.getElementById('chat-input'); if(!input.value.trim() || !currentRoomId) return;
            await addDoc(collection(db, `rooms/${currentRoomId}/messages`), { uid: auth.currentUser.uid, name: userProfile.name, emoji: userProfile.emoji, text: input.value.trim(), createdAt: Date.now() });
            input.value = ""; playPopSound(true);
        };

        const loadRooms = () => { 
            onSnapshot(query(collection(db, "rooms"), where("members", "array-contains", auth.currentUser.uid)), s => { 
                const list = document.getElementById('room-list'); list.innerHTML = ""; 
                s.forEach(d => { list.innerHTML += `<div class="list-item" onclick="changeTab('${d.id}')"><div class="list-info"><div class="list-name">${d.data().name}</div><div class="list-id">ROOM ID: ${d.id}</div></div><div class="list-arrow">›</div></div>`; }); 
            }); 
        };

        function loadMessages(rid) {
            if(unsubMsg) unsubMsg();
            lastMsgTime = Date.now();
            unsubMsg = onSnapshot(query(collection(db, `rooms/${rid}/messages`), orderBy("createdAt", "asc")), s => {
                const list = document.getElementById('msg-list'); list.innerHTML = "";
                s.forEach(d => {
                    const data = d.data(), isMine = data.uid === auth.currentUser.uid;
                    if (!isMine && data.createdAt > lastMsgTime) { playPopSound(false); lastMsgTime = data.createdAt; }
                    let content = data.text || "";
                    if(data.voiceData) {
                        const vid = d.id;
                        content = `<div class="voice-player"><button id="btn-${vid}" class="play-btn" onclick="playVoice_${vid}()">▶️</button><input id="seek-${vid}" type="range" class="seek-bar" value="0" oninput="seekVoice_${vid}(this.value)"></div>`;
                        setTimeout(() => initVoicePlayer(vid, data.voiceData), 50);
                    }
                    list.innerHTML += `<div class="msg-bubble ${isMine ? 'mine' : 'other'}"><div class="user-icon">${data.emoji || '👤'}</div><div class="msg-content">${content}</div></div>`;
                });
                document.getElementById('scroll-area').scrollTop = document.getElementById('scroll-area').scrollHeight;
            });
        }

        // メモ保存
        const loadMemoData = async () => { const m = await getDoc(doc(db, "memos", auth.currentUser.uid)); if(m.exists()) document.getElementById('memo-input').value = m.data().text; };
        document.getElementById('memo-input').oninput = async (e) => { if(auth.currentUser) await setDoc(doc(db, "memos", auth.currentUser.uid), { text: e.target.value }); };

        // 共通機能
        window.openModal = (t, d, c, f) => { document.getElementById('modal-title').innerText = t; document.getElementById('modal-desc').innerText = d; document.getElementById('modal-confirm-btn').innerText = c; document.getElementById('modal-confirm-btn').onclick = () => { f(); closeModal(); }; document.getElementById('custom-modal').style.display = 'flex'; };
        window.closeModal = () => document.getElementById('custom-modal').style.display = 'none';
        window.logout = () => signOut(auth).then(() => location.reload());
        window.updateProfile = async () => {
            const n = document.getElementById('p-name').value, e = document.getElementById('p-emoji').value;
            if(!n) return alert("名前は必ず入力してください");
            await setDoc(doc(db, "users", auth.currentUser.uid), {name:n, emoji:e}, {merge:true});
            location.reload(); 
        };
        window.joinRoom = async () => {
            const rid = document.getElementById('join-id').value.toUpperCase().trim(), pass = document.getElementById('join-pass').value.trim();
            if(!rid || !pass) return;
            const rDoc = await getDoc(doc(db, "rooms", rid));
            if(rDoc.exists() && rDoc.data().password === pass) { await updateDoc(doc(db, "rooms", rid), { members: arrayUnion(auth.currentUser.uid) }); changeTab(rid); } else { alert("ルームが見つからないか、パスワードが違います"); }
        };
        window.createRoom = () => {
            const n = prompt("ルーム名を入力してください"); if(!n) return;
            const p = prompt("6桁のパスワードを設定してください", "000000"); if(!p || p.length !== 6) return;
            const rid = Math.random().toString(36).substring(2, 8).toUpperCase();
            setDoc(doc(db, "rooms", rid), { name: n, password: p, host: auth.currentUser.uid, members: [auth.currentUser.uid], createdAt: Date.now() }).then(() => changeTab(rid));
        };
        window.showRoomMenu = async () => {
            const rDoc = await getDoc(doc(db, "rooms", currentRoomId));
            const isHost = rDoc.data().host === auth.currentUser.uid;
            openModal(isHost ? "ルームを削除" : "ルームを退出", isHost ? "このルームと全てのログを完全に消去しますか？" : "このルームから退出しますか？", isHost ? "削除実行" : "退出実行", async () => {
                if(isHost) await deleteDoc(doc(db, "rooms", currentRoomId));
                else await updateDoc(doc(db, "rooms", currentRoomId), { members: arrayRemove(auth.currentUser.uid) });
                changeTab('home');
            });
        };
    </script>
</body>
</html>
